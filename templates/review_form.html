<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Expert Review</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="single-page-shell">
    <section class="page-card">
      <a class="back-link" href="/">Back to calculator</a>
      <p class="eyebrow">Real World Electric</p>
      <h1>Expert Review</h1>
      <p class="subhead">Send the calculation and project details for a master electrician review.</p>

      <div class="review-summary" id="reviewSummary">
        <strong>No calculation attached yet.</strong>
        <span>Run the calculator first if you want the load summary included automatically.</span>
      </div>

      <form class="stacked-form" action="{{ url_for('api.submit_review_form') }}" method="post">
        <div class="two-column-fields">
          <label>
            <span>First name</span>
            <input type="text" id="first_name" name="first_name" autocomplete="given-name" required>
          </label>
          <label>
            <span>Last name</span>
            <input type="text" id="last_name" name="last_name" autocomplete="family-name" required>
          </label>
        </div>

        <div class="two-column-fields">
          <label>
            <span>Phone</span>
            <input type="tel" id="phone" name="phone" autocomplete="tel" required>
          </label>
          <label>
            <span>Email</span>
            <input type="email" id="email" name="email" autocomplete="email" required>
          </label>
        </div>

        <label>
          <span>Project address</span>
          <input type="text" id="project_address" name="project_address" autocomplete="street-address" required>
        </label>

        <label>
          <span>Reason</span>
          <select id="reason" name="reason" required>
            <option value="">Select reason</option>
            <option value="New Secondary Suite">New secondary suite</option>
            <option value="New Laneway House">New laneway house</option>
            <option value="New Car Charger">New car charger</option>
            <option value="New Hot Tub or Appliance">New hot tub or appliance</option>
            <option value="Other">Other</option>
          </select>
        </label>

        <label>
          <span>Notes</span>
          <textarea id="comments" name="comments" rows="4" placeholder="Anything the reviewer should know?"></textarea>
        </label>

        <input type="hidden" id="calcInput" name="calcInput" value="">
        <input type="hidden" id="calcResult" name="calcResult" value="">
        <button type="submit" class="primary-action">Send for review</button>
      </form>
    </section>
  </main>

  <script>
    const input = localStorage.getItem("lastCalculationInput") || "";
    const result = localStorage.getItem("lastCalculationResult") || "";
    document.getElementById("calcInput").value = input;
    document.getElementById("calcResult").value = result;

    if (result) {
      try {
        const parsed = JSON.parse(result);
        const amps = Number(parsed["Total Amps"] || 0).toFixed(1);
        const watts = Math.round(Number(parsed["Total Calculated Load (Watts)"] || 0)).toLocaleString();
        document.getElementById("reviewSummary").innerHTML = `
          <strong>${amps} A calculated load</strong>
          <span>${watts} W total, ${parsed["Service Conductor Type and Size"] || "conductor pending"}</span>
        `;
      } catch (error) {
        document.getElementById("reviewSummary").innerHTML = "<strong>Calculation data could not be previewed.</strong><span>It will still be submitted if available.</span>";
      }
    }
  </script>
</body>
</html>
