<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Real World Electric</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="single-page-shell">
    <section class="page-card">
      <a class="back-link" href="/">Back to calculator</a>
      <p class="eyebrow">Real World Electric</p>
      <h1>Contact</h1>
      <p class="subhead">Send the project details and we will follow up.</p>

      <form class="stacked-form" action="{{ url_for('api.submit_contact') }}" method="post">
        <label>
          <span>Name</span>
          <input type="text" name="name" autocomplete="name" required>
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>
          <span>Message</span>
          <textarea name="message" rows="5" placeholder="What are you trying to calculate or install?" required></textarea>
        </label>
        <button type="submit" class="primary-action">Send message</button>
      </form>

      <div class="contact-actions">
        <a href="tel:+14038082811">Call 403-808-2811</a>
        <a href="mailto:Bart@Realworldelectric.com">Email Bart</a>
        <a href="https://t.me/rwemec">Telegram @rwemec</a>
      </div>
    </section>
  </main>
</body>
</html>
